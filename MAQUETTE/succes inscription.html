                        "headline": ["Manrope"],
                        "display": ["Manrope"],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        h1, h2, .brand-font {
            font-family: 'Manrope', sans-serif;
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
<!-- Minimalist Top Bar (Reference: TopNavBar from JSON) -->
<header class="flex justify-center items-center w-full py-8 px-8 bg-[#F3FDE9]">
<div class="flex items-center gap-2">
<span class="text-2xl font-extrabold text-primary tracking-tighter brand-font">NovaSMS</span>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-4">
<!-- Success Container: Tonal Layering (Surface-container-lowest on Surface) -->
<div class="w-full max-w-lg bg-surface-container-lowest p-10 md:p-16 rounded-xl text-center">
<!-- Styled Success Icon -->
<div class="mb-10 inline-flex items-center justify-center">
<div class="relative">
<!-- Outer Decorative Glow (Tonal Shift, No Shadows) -->
<div class="absolute inset-0 bg-primary-container opacity-20 rounded-full scale-150 blur-xl"></div>
<!-- Icon Container -->
<div class="relative w-24 h-24 bg-surface-container rounded-full flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-6xl" style="font-variation-settings: 'FILL' 1, 'wght' 600;">
                            check_circle
                        </span>
</div>
</div>
</div>
<!-- Content Section -->
<div class="space-y-6">
<h1 class="text-3xl md:text-4xl font-extrabold text-on-surface tracking-tight leading-tight">
                    Félicitations ! Votre compte est prêt.
                </h1>
<p class="text-on-surface-variant text-lg leading-relaxed max-w-sm mx-auto">
                    Votre adresse e-mail a été confirmée avec succès. Vous faites désormais partie de l'écosystème <span class="font-bold text-secondary">NovaSMS</span>.
                </p>
<!-- Primary Action with Gradient Rule -->
<div class="pt-8">
<a class="inline-flex items-center justify-center px-10 py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold rounded-lg transition-transform duration-150 hover:scale-[1.02] active:scale-95 group" href="#">
<span>Accéder au tableau de bord</span>
<span class="material-symbols-outlined ml-2 transition-transform group-hover:translate-x-1">
                            arrow_forward
                        </span>
</a>
</div>
<!-- Secondary Support Link -->
<div class="pt-4">
<button class="text-sm font-semibold text-secondary hover:text-primary transition-colors duration-200 uppercase tracking-widest label-sm">
                        Besoin d'aide ?
                    </button>
</div>
</div>
</div>
</main>
<!-- Branding Texture / Image Component -->
<div class="hidden lg:block fixed bottom-0 left-0 w-full opacity-10 pointer-events-none">
<img alt="Abstract geometric background" class="w-full object-cover h-64" data-alt="abstract geometric pattern with soft green and teal fluid shapes on a very light background minimalist high end editorial style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD3qK3vuCoFTaJtD9MPBoMSatwltNQVQxcBxJYLpaR62XGFSQZ3Au9giFuWgVSMDcU4Jr5ZI21_JMkzdJwvP5IZiRZJO-nSNm5qRlY6iRFeGadolPcdT0j8PjVqn1h3BxnAQZcqb-pw8lM8f0pKT01N8REVmE6B48_nxRHj17BPBGYtb90s5C0NDkhvBYXiXn-ds9Tr5EWjCasOP5wwRsc6mwHVvsC3KIoKZKPrKauNXJzpH-ts4apC2LEaW8q04_8dWZ4HuWPw2NaP"/>
</div>
<!-- Footer Area -->
<footer class="py-12 text-center">
<p class="text-outline text-xs font-medium tracking-wide uppercase">
            Copyright 2026 NovaSend
        </p>
</footer>
</body></html>
