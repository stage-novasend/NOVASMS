<!DOCTYPE html>

<html lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed": "#022100",
                        "on-secondary-container": "#2c6b77",
                        "surface-container-low": "#edf7e3",
                        "on-error-container": "#93000a",
                        "inverse-on-surface": "#eaf4e1",
                        "primary": "#136e00",
                        "on-surface": "#161e12",
                        "on-tertiary-container": "#791a49",
                        "secondary-fixed": "#b0ecfb",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#3d4a37",
                        "on-secondary-fixed": "#001f25",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#0a4c00",
                        "secondary-container": "#ade9f8",
                        "inverse-primary": "#4ee330",
                        "primary-container": "#2ec80a",
                        "on-tertiary-fixed": "#3e0020",
                        "error-container": "#ffdad6",
                        "surface-variant": "#dce6d3",
                        "secondary": "#276673",
                        "on-primary-fixed-variant": "#0c5300",
                        "tertiary-container": "#ff87b7",
                        "surface-container-high": "#e2ebd8",
                        "surface-container": "#e7f1de",
                        "background": "#f3fde9",
                        "surface-container-highest": "#dce6d3",
                        "inverse-surface": "#2a3326",
                        "surface-dim": "#d3ddca",
                        "tertiary-fixed-dim": "#ffb0cc",
                        "secondary-fixed-dim": "#94d0de",
                        "primary-fixed-dim": "#4ee330",
                        "outline": "#6d7b65",
                        "on-background": "#161e12",
                        "on-secondary-fixed-variant": "#004e5a",
                        "primary-fixed": "#79ff59",
                        "on-error": "#ffffff",
                        "tertiary": "#9f3967",
                        "surface-bright": "#f3fde9",
                        "surface-tint": "#136e00",
                        "tertiary-fixed": "#ffd9e4",
                        "outline-variant": "#bccbb2",
                        "on-tertiary-fixed-variant": "#80214e",
                        "on-primary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "surface": "#f3fde9"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "display": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-gradient-primary {
            background: linear-gradient(135deg, #136e00 0%, #2ec80a 100%);
        }
        .glass-panel {
            background: rgba(243, 253, 233, 0.7);
            backdrop-filter: blur(16px);
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface min-h-screen flex flex-col">
<!-- TopNavBar Suppression: Page is Transactional (Reset Password) -->
<main class="flex-grow flex items-center justify-center px-4 py-12 relative overflow-hidden">
<!-- Background Architectural Elements -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none opacity-40">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[60%] rounded-full bg-primary-container blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[60%] rounded-full bg-secondary-container blur-[120px]"></div>
</div>
<div class="w-full max-w-md relative z-10">
<!-- Brand Anchor -->
<div class="mb-10 text-center">
<h1 class="font-headline font-black text-3xl tracking-tighter text-primary">NovaSMS</h1>
<p class="font-label text-xs uppercase tracking-widest text-on-surface-variant mt-1">The Precision Architect</p>
</div>
<!-- Main Card Container -->
<div class="bg-surface-container-lowest rounded-xl p-8 lg:p-10 shadow-[0_32px_64px_-16px_rgba(22,30,18,0.06)] relative overflow-hidden">
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-primary"></div>
<header class="mb-8">
<h2 class="font-headline text-2xl font-bold tracking-tight text-on-surface mb-2">Mot de passe oublié</h2>
<p class="font-body text-sm text-on-surface-variant leading-relaxed">
                        Entrez votre adresse e-mail ci-dessous. Nous vous enverrons un lien sécurisé pour réinitialiser votre accès.
                    </p>
</header>
<form class="space-y-6">
<div class="space-y-2">
<label class="block font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant" for="email">
                            Adresse E-mail
                        </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-sm">mail</span>
</div>
<input autocomplete="email" class="w-full pl-10 pr-4 py-3 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary-fixed-dim transition-all text-sm placeholder:text-outline-variant font-body" id="email" name="email" placeholder="nom@entreprise.com" required="" type="email"/>
</div>
</div>
<div class="pt-2">
<button class="w-full bg-gradient-primary text-on-primary font-headline font-bold py-3.5 rounded-lg hover:shadow-lg hover:shadow-primary/20 active:scale-[0.98] transition-all duration-200" type="submit">
                            Reset
                        </button>
</div>
</form>
<footer class="mt-8 pt-6 border-t border-surface-container flex justify-center">
<a class="inline-flex items-center gap-2 text-sm font-medium text-secondary hover:text-primary transition-colors group" href="#">
<span class="material-symbols-outlined text-sm group-hover:-translate-x-1 transition-transform">arrow_back</span>
                        Retour à la connexion
                    </a>
</footer>
</div>
<!-- Technical Detail -->
<div class="mt-8 flex items-center justify-between px-2">
<div class="flex gap-4">
<a class="text-[10px] font-label font-medium uppercase tracking-widest text-on-surface-variant/60 hover:text-on-surface transition-colors" href="#">Support</a>
<a class="text-[10px] font-label font-medium uppercase tracking-widest text-on-surface-variant/60 hover:text-on-surface transition-colors" href="#">Privacy</a>
</div>
<p class="text-[10px] font-label font-medium uppercase tracking-widest text-on-surface-variant/40">
                    Precision Protocol v4.2
                </p>
</div>
</div>
</main>
<footer class="w-full py-8 text-center border-t border-surface-container-low mt-auto">
<p class="font-label text-xs text-on-surface-variant/50 tracking-wide">
            Copyright 2026 NovaSMS. Tous droits réservés.
        </p>
</footer>
</body></html>
