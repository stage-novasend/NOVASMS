version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: novasms-postgres
    environment:
      POSTGRES_USER: novasms
      POSTGRES_PASSWORD: novasms_dev_password_2026
      POSTGRES_DB: novasms_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U novasms']
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: novasms-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
  adminer:
    image: adminer:latest
    container_name: novasms-adminer
    ports:
      - '8080:8080'
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
  minio:
    image: minio/minio:latest
    container_name: novasms-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
  minio-init:
    image: minio/mc:latest
    container_name: novasms-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 2; done &&
      mc mb -p local/novasms-campaign-images || true &&
      mc anonymous set download local/novasms-campaign-images &&
      exit 0
      "
volumes:
  postgres_data:
  redis_data:
  minio_data:
